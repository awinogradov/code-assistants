name: Licenses audit
description: Detect the consumer's package manager (pnpm, npm, or bun), install dependencies, and regenerate an SPDX-grouped license report with the action's bundled generator. Auto-commits drift on same-repo PRs and fails fork PRs that ship stale license data. Skips when no lockfile is present.

inputs:
  bot_token:
    description: |
      PAT (classic with `repo`, or fine-grained with `contents: write`) or GitHub App installation token used to check out the PR branch with persisted credentials and push the regenerated license report. The default `GITHUB_TOKEN` is not used: the auto-commit must be authored by and pushed as the bot identity so it carries correct attribution and re-triggers the PR's checks (commits pushed with `GITHUB_TOKEN` do not). Pass the `secrets.BOT_TOKEN` secret. Required: an empty value fails the push with no fallback.
    required: true
  bot_username:
    description: |
      Git author/committer login for the auto-commit. Defaults to `github-actions[bot]` when unset. Pass the `vars.BOT_USERNAME` repository variable to attribute the commit to a dedicated bot identity.
    required: false
    default: ""
  licenses-file:
    description: Path to the generated license report checked for drift.
    required: false
    default: LICENSES.md
  node-version-file:
    description: File `actions/setup-node` reads the Node version from.
    required: false
    default: .nvmrc

outputs:
  skipped:
    description: "`true` when no lockfile was found and the audit was skipped."
    value: ${{ steps.pm.outputs.skip }}
  drifted:
    description: "`true` when the regenerated license report differed from the committed one."
    value: ${{ steps.drift.outputs.drifted }}

runs:
  using: composite
  steps:
    - name: Detect PR origin
      id: src
      shell: bash
      run: |
        if [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
          echo "same_repo=true" >> "$GITHUB_OUTPUT"
        else
          echo "same_repo=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Checkout PR branch (same-repo; writable)
      if: steps.src.outputs.same_repo == 'true'
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
        fetch-depth: 0
        persist-credentials: true
        token: ${{ inputs.bot_token }}

    - name: Checkout (fork PR; read-only)
      if: steps.src.outputs.same_repo == 'false'
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        persist-credentials: false

    - name: Detect package manager
      id: pm
      shell: bash
      run: |
        set -euo pipefail
        if [ -f pnpm-lock.yaml ]; then
          manager=pnpm
        elif [ -f package-lock.json ]; then
          manager=npm
        elif [ -f bun.lock ] || [ -f bun.lockb ]; then
          manager=bun
        else
          echo "::notice::No lockfile (pnpm-lock.yaml, package-lock.json, or bun.lock) found — skipping license audit."
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        {
          echo "skip=false"
          echo "manager=${manager}"
        } >> "$GITHUB_OUTPUT"
        echo "::notice::Detected package manager: ${manager}"

    - name: Setup Node
      if: steps.pm.outputs.skip == 'false'
      uses: actions/setup-node@v4
      with:
        node-version-file: ${{ inputs.node-version-file }}

    - name: Enable Corepack (pnpm)
      if: steps.pm.outputs.skip == 'false' && steps.pm.outputs.manager == 'pnpm'
      shell: bash
      env:
        COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      run: corepack enable

    - name: Setup Bun
      if: steps.pm.outputs.skip == 'false'
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.x

    - name: Install dependencies
      if: steps.pm.outputs.skip == 'false'
      shell: bash
      env:
        PACKAGE_MANAGER: ${{ steps.pm.outputs.manager }}
      run: |
        set -euo pipefail
        case "$PACKAGE_MANAGER" in
          pnpm) pnpm install --frozen-lockfile ;;
          npm) npm ci ;;
          bun) bun install --frozen-lockfile ;;
          *) echo "::error::Unsupported package manager: ${PACKAGE_MANAGER}"; exit 1 ;;
        esac

    - name: Regenerate license report
      if: steps.pm.outputs.skip == 'false'
      shell: bash
      env:
        LICENSES_FILE: ${{ inputs.licenses-file }}
      run: bun "${{ github.action_path }}/src/licenses-report.ts"

    - name: Detect drift
      id: drift
      if: steps.pm.outputs.skip == 'false'
      shell: bash
      env:
        LICENSES_FILE: ${{ inputs.licenses-file }}
      run: |
        if git diff --quiet -- "$LICENSES_FILE"; then
          echo "drifted=false" >> "$GITHUB_OUTPUT"
        else
          echo "drifted=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Auto-commit regenerated report (same-repo)
      if: steps.drift.outputs.drifted == 'true' && steps.src.outputs.same_repo == 'true'
      shell: bash
      env:
        LICENSES_FILE: ${{ inputs.licenses-file }}
        BOT_USERNAME: ${{ inputs.bot_username }}
        HEAD_REF: ${{ github.head_ref }}
      run: |
        set -euo pipefail
        git config user.name "${BOT_USERNAME:-github-actions[bot]}"
        git config user.email "${BOT_USERNAME:-41898282+github-actions[bot]}@users.noreply.github.com"
        git add "$LICENSES_FILE"
        git diff --staged --quiet || git commit -m "chore(licenses): regenerate license report"
        git push origin "HEAD:$HEAD_REF"

    - name: Fail (fork PR with drift)
      if: steps.drift.outputs.drifted == 'true' && steps.src.outputs.same_repo == 'false'
      shell: bash
      env:
        LICENSES_FILE: ${{ inputs.licenses-file }}
      run: |
        echo "::error::$LICENSES_FILE is out of date for the updated dependencies. A maintainer will regenerate it after merge, or run the licenses-audit generator and commit the result to this branch."
        git diff -- "$LICENSES_FILE"
        exit 1
