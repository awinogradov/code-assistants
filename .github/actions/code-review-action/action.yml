name: "AI Code Review"
description: "AI-powered code review using Claude Code"
author: "Code Assistants"

inputs:
  pr_number:
    description: "Pull request number (auto-detected from event context, override with explicit value)"
    required: false
  pr_head_sha:
    description: "PR head commit SHA (auto-detected from event context, override with explicit value)"
    required: false
  mode:
    description: "Action mode: 'review' for PR review, 'react' for comment reaction"
    required: false
    default: "review"
  react_to_comments:
    description: "Auto-detect and handle comment reactions when bot is mentioned"
    required: false
    default: "true"
  comment_id:
    description: "ID of the comment to react to (required for react mode)"
    required: false
  comment_body:
    description: "Body of the triggering comment (required for react mode)"
    required: false
  comment_path:
    description: "File path for review thread comments (empty for general PR comments)"
    required: false
  comment_line:
    description: "Line number for review thread comments"
    required: false
  reviewer:
    description: "GitHub username to add as reviewer. Required — no default."
    required: true
  bot_username:
    description: "Bot username whose authored PRs skip AI review (the reviewer cannot review its own PR). Falls back to reviewer if omitted."
    required: false
  release_pr_authors:
    description: "Comma-separated list of trusted authors whose release-branch PRs get an auto-approval after review is skipped. Empty (default) disables auto-approval; the action still skips review for any release-branch PR. Set this only to identities you trust to open release PRs (e.g., 'github-actions[bot]', 'my-org-bot')."
    required: false
  bot_token:
    description: "GitHub token for bot operations"
    required: true
  anthropic_api_key:
    description: "Anthropic API key (alternative to claude_oauth_token)"
    required: false
  claude_oauth_token:
    description: "Claude Code OAuth token (alternative to anthropic_api_key)"
    required: false
  anthropic_base_url:
    description: "Custom Anthropic API base URL for routing through a gateway/proxy/compatible endpoint (full URL including scheme, e.g. https://gateway.example.com). When unset, the SDK uses the default api.anthropic.com host."
    required: false
  anthropic_auth_token:
    description: "Bearer auth token for a custom Anthropic host (sent as Authorization: Bearer). Alternative to anthropic_api_key — set one, not both."
    required: false
  settings:
    description: "Claude Code settings JSON (use env to pass API keys for MCP servers)"
    required: false
  mcp_config:
    description: "Additional MCP servers configuration JSON (merged with repo .mcp.json)"
    required: false
  model:
    description: "Claude model to use for AI operations"
    required: false
    default: "claude-sonnet-5"
  debug_logs:
    description: "Enable verbose DEBUG-level Claude trace logging and force execution artifact upload. When false, artifacts upload only on failure or when a run exceeds 5 minutes."
    required: false
    default: "false"
  preflight_checks:
    description: "Wait for all PR checks to pass before running AI review (review mode only)"
    required: false
    default: "true"
  poll_interval:
    description: "Seconds between polling for check statuses (used with preflight_checks)"
    required: false
    default: "10"
  checks_timeout:
    description: "Maximum seconds to wait for checks to complete (used with preflight_checks)"
    required: false
    default: "600"
  rules_doc_url:
    description: "Canonical GitHub blob URL of the pr:review SKILL.md. The review/answer skills use it to build CHECK-* rule links. Override only when the skill lives in a fork."
    required: false
    default: "https://github.com/awinogradov/code-assistants/blob/main/claude-plugins/autopilot/skills/pr%3Areview/SKILL.md"
  review_prompt:
    description: "Leading slash command / prompt for review mode. The action appends the runtime arguments block (REPO, PR_NUMBER, REVIEWER, PR_AUTHOR, RULES_DOC_URL) after this value, so a custom prompt still receives them. Override to run a different review skill without forking the action."
    required: false
    default: "/autopilot:pr-review"
  react_prompt:
    description: "Leading slash command / prompt for react mode (comment reactions). The action appends the runtime arguments block (REPO, PR_NUMBER, REVIEWER, PR_AUTHOR, COMMENT_BODY, COMMENT_PATH, COMMENT_LINE, NEEDS_REVERDICT, RULES_DOC_URL) after this value, so a custom prompt still receives them. Override to run a different reply skill without forking the action."
    required: false
    default: "/autopilot:pr-answer"
  marketplaces:
    description: "Plugin marketplaces to register before the run, one `name=source` per line. `source` follows `claude plugin marketplace add`: `.` is the checked-out repo, `owner/repo[@ref]` is GitHub, `https://…` a URL, `npm:<pkg>` an npm package, and a `./` or `/` path is a local directory (or a `.json` file). Relative paths resolve against the workspace."
    required: false
    default: ""
  plugins:
    description: "Plugins to install before the run, one `plugin@marketplace` per line; the marketplace must be registered via `marketplaces` (or the consumer repo's own settings). Their slash commands then resolve for `review_prompt` / `react_prompt`."
    required: false
    default: ""

runs:
  using: composite
  steps:
    # ── Validation ──

    # Skip for dependabot PRs: their runs use the Dependabot secrets store, so
    # anthropic_api_key/bot_token are empty and this gate would hard-exit before
    # "Detect context" reaches its existing dependabot skip. Gating here lets that
    # skip run (it needs only bot_token) and set skip=true, so the job stays GREEN.
    - name: Validate tokens
      if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}
      shell: bash
      env:
        BOT_TOKEN: ${{ inputs.bot_token }}
        ANTHROPIC_KEY: ${{ inputs.anthropic_api_key }}
        AUTH_TOKEN: ${{ inputs.anthropic_auth_token }}
        CLAUDE_TOKEN: ${{ inputs.claude_oauth_token }}
      run: |
        echo "bot_token: ${#BOT_TOKEN} chars"
        echo "anthropic_api_key: ${#ANTHROPIC_KEY} chars"
        echo "anthropic_auth_token: ${#AUTH_TOKEN} chars"
        echo "claude_oauth_token: ${#CLAUDE_TOKEN} chars"

        if [[ -z "$BOT_TOKEN" ]]; then
          echo "::error::bot_token is empty"
          exit 1
        fi

        if [[ -z "$ANTHROPIC_KEY" && -z "$CLAUDE_TOKEN" && -z "$AUTH_TOKEN" ]]; then
          echo "::error::Provide one of anthropic_api_key, anthropic_auth_token, or claude_oauth_token"
          exit 1
        fi

        if [[ -n "$ANTHROPIC_KEY" && -n "$AUTH_TOKEN" ]]; then
          echo "::error::Set anthropic_api_key or anthropic_auth_token, not both"
          exit 1
        fi

    # ── Context detection ──

    - name: Detect context
      id: ctx
      shell: bash
      env:
        INPUT_REACT_TO_COMMENTS: ${{ inputs.react_to_comments }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        INPUT_PR_HEAD_SHA: ${{ inputs.pr_head_sha }}
        INPUT_COMMENT_ID: ${{ inputs.comment_id }}
        INPUT_COMMENT_BODY: ${{ inputs.comment_body }}
        INPUT_COMMENT_PATH: ${{ inputs.comment_path }}
        INPUT_COMMENT_LINE: ${{ inputs.comment_line }}
        INPUT_REVIEWER: ${{ inputs.reviewer }}
        INPUT_BOT_USERNAME: ${{ inputs.bot_username }}
        INPUT_RELEASE_PR_AUTHORS: ${{ inputs.release_pr_authors }}
        EVENT_NAME: ${{ github.event_name }}
        EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        EVENT_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        EVENT_PR_DRAFT: ${{ github.event.pull_request.draft }}
        EVENT_PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        EVENT_PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        EVENT_COMMENT_ID: ${{ github.event.comment.id }}
        EVENT_COMMENT_PATH: ${{ github.event.comment.path }}
        EVENT_COMMENT_LINE: ${{ github.event.comment.original_line || github.event.comment.line }}
        EVENT_COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        EVENT_COMMENT_IN_REPLY_TO_ID: ${{ github.event.comment.in_reply_to_id }}
        EVENT_IS_PR_COMMENT: ${{ github.event.issue.pull_request && 'true' || 'false' }}
        COMMENT_BODY_RAW: ${{ github.event.comment.body }}
        EVENT_REVIEW_ID: ${{ github.event.review.id }}
        EVENT_REVIEW_AUTHOR: ${{ github.event.review.user.login }}
        REVIEW_BODY_RAW: ${{ github.event.review.body }}
        EVENT_SENDER: ${{ github.event.sender.login }}
        GH_TOKEN: ${{ inputs.bot_token }}
      run: |
        # Skip draft PRs (covers pull_request and pull_request_review_comment events)
        if [[ "$EVENT_PR_DRAFT" == "true" ]]; then
          echo "Skipping: draft PR"
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Skip draft PRs for issue_comment events (draft status not in payload)
        if [[ "$EVENT_NAME" == "issue_comment" && "$EVENT_IS_PR_COMMENT" == "true" ]]; then
          if [[ "$(gh pr view "$EVENT_ISSUE_NUMBER" --json isDraft --jq '.isDraft' 2>/dev/null)" == "true" ]]; then
            echo "Skipping: draft PR"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        fi

        # Skip release PRs. Optionally auto-approve them so they aren't blocked
        # on the requested-reviewer slot — but only when the author is in the
        # explicit `release_pr_authors` trust list AND the action is in review
        # mode. The branch-name check alone is NOT a security boundary; anyone
        # with push access could open a `release-pwn-1.0.0` PR otherwise.
        if [[ "$EVENT_NAME" == "pull_request" && "$EVENT_PR_HEAD_REF" =~ ^(release-|delivery-) ]]; then
          echo "Skipping: release/delivery branch ($EVENT_PR_HEAD_REF)"
          if [[ "$INPUT_MODE" == "review" && -n "$INPUT_RELEASE_PR_AUTHORS" ]]; then
            # Iterate the comma-separated list and compare each entry literally
            # to the PR author. Quoted RHS in `[[ x == "y" ]]` forces literal
            # comparison, so GitHub usernames containing glob metacharacters
            # (e.g. `github-actions[bot]`) are matched as strings, not as
            # bracket-expression patterns.
            author_match=false
            IFS=',' read -ra trusted_authors <<< "$INPUT_RELEASE_PR_AUTHORS"
            for entry in "${trusted_authors[@]}"; do
              trimmed="${entry#"${entry%%[![:space:]]*}"}"
              trimmed="${trimmed%"${trimmed##*[![:space:]]}"}"
              if [[ -n "$trimmed" && "$EVENT_PR_AUTHOR" == "$trimmed" ]]; then
                author_match=true
                break
              fi
            done
            if [[ "$author_match" == "true" ]]; then
              approve_stderr="$(mktemp)"
              if gh api -X POST \
                "repos/${GITHUB_REPOSITORY}/pulls/${EVENT_PR_NUMBER}/reviews" \
                -f event=APPROVE \
                -f body="Auto-approved: release branch by trusted author, AI review skipped per workflow policy." \
                2> "$approve_stderr"; then
                echo "Auto-approval posted for trusted author '$EVENT_PR_AUTHOR'"
              else
                # A failed APPROVE is always a misconfiguration to surface — most
                # commonly a self-approval attempt (the release PR author is also
                # the reviewer), which GitHub rejects with "Can not approve your
                # own pull request". Author release PRs with an identity distinct
                # from the reviewer's `bot_token`. Never swallow this: a silent
                # skip is exactly what let the auto-approval fail unnoticed.
                echo "::error::Auto-approval failed for '$EVENT_PR_AUTHOR' on release PR ${EVENT_PR_NUMBER}: $(cat "$approve_stderr")"
              fi
              rm -f "$approve_stderr"
            else
              echo "Auto-approval skipped: author '$EVENT_PR_AUTHOR' not in release_pr_authors"
            fi
          fi
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Skip PRs authored by the bot itself (bot_username input, falls back to reviewer).
        # The reviewer identity is the bot, and GitHub forbids a PR's author from being its
        # own reviewer or self-approving, so the AI review can never land a verdict here.
        if [[ "$EVENT_NAME" == "pull_request" && "$EVENT_PR_AUTHOR" == "${INPUT_BOT_USERNAME:-$INPUT_REVIEWER}" ]]; then
          echo "Skipping: PR authored by bot $EVENT_PR_AUTHOR"
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Skip dependabot PRs
        if [[ "$EVENT_NAME" == "pull_request" && "$EVENT_PR_AUTHOR" == "dependabot[bot]" ]]; then
          echo "Skipping: dependabot PR"
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # When react_to_comments is disabled, pass through explicit inputs
        if [[ "$INPUT_REACT_TO_COMMENTS" != "true" ]]; then
          {
            echo "mode=${INPUT_MODE}"
            echo "pr_number=${INPUT_PR_NUMBER:-${EVENT_PR_NUMBER:-$EVENT_ISSUE_NUMBER}}"
            echo "pr_head_sha=${INPUT_PR_HEAD_SHA:-$EVENT_PR_HEAD_SHA}"
            echo "comment_id=${INPUT_COMMENT_ID}"
            echo "comment_path=${INPUT_COMMENT_PATH}"
            echo "comment_line=${INPUT_COMMENT_LINE}"
            echo "skip=false"
          } >> "$GITHUB_OUTPUT"

          delimiter="$(openssl rand -hex 16)"
          {
            echo "comment_body<<${delimiter}"
            echo "$INPUT_COMMENT_BODY"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

          exit 0
        fi

        # Auto-detection: pull_request event → review mode
        if [[ "$EVENT_NAME" == "pull_request" ]]; then
          {
            echo "mode=review"
            echo "pr_number=${EVENT_PR_NUMBER}"
            echo "pr_head_sha=${EVENT_PR_HEAD_SHA}"
            echo "skip=false"
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Skip events triggered by the bot itself (prevents infinite loops)
        if [[ "$EVENT_SENDER" == "$INPUT_REVIEWER" ]]; then
          echo "Skipping: event triggered by bot ($EVENT_SENDER)"
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Skip unsupported events early
        # Note: pull_request_review is intentionally excluded — it causes
        # concurrency group collisions that cancel in-progress review runs.
        # Use pull_request_review_comment for inline reply reactions instead.
        if [[ "$EVENT_NAME" != "issue_comment" && \
              "$EVENT_NAME" != "pull_request_review_comment" ]]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Auto-detection: comment/review events → validate and extract
        EFFECTIVE_AUTHOR="${EVENT_COMMENT_AUTHOR:-$EVENT_REVIEW_AUTHOR}"
        EFFECTIVE_BODY="${COMMENT_BODY_RAW:-$REVIEW_BODY_RAW}"
        EFFECTIVE_ID="${EVENT_COMMENT_ID:-$EVENT_REVIEW_ID}"

        if [[ "$EFFECTIVE_AUTHOR" == "$INPUT_REVIEWER" ]]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Bypass the @mention requirement when replying inside a review thread
        # whose root comment was authored by the bot — no mention needed to keep
        # the conversation going.
        BOT_IDENTITY="${INPUT_BOT_USERNAME:-$INPUT_REVIEWER}"
        BOT_IN_THREAD="false"
        if [[ "$EVENT_NAME" == "pull_request_review_comment" \
              && "$EVENT_COMMENT_IN_REPLY_TO_ID" =~ ^[0-9]+$ \
              && "$BOT_IDENTITY" =~ ^[A-Za-z0-9_-]+$ ]]; then
          PARENT_AUTHOR=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/comments/${EVENT_COMMENT_IN_REPLY_TO_ID}" \
            --jq '.user.login' 2>/dev/null) || {
            echo "::warning::Failed to fetch parent comment ${EVENT_COMMENT_IN_REPLY_TO_ID}"
            PARENT_AUTHOR=""
          }
          if [[ "$PARENT_AUTHOR" == "$BOT_IDENTITY" ]]; then
            BOT_IN_THREAD="true"
            echo "Bot authored parent comment — bypassing mention requirement"
          fi
        fi

        if [[ "$EFFECTIVE_BODY" != *"@${INPUT_REVIEWER}"* && "$BOT_IN_THREAD" != "true" ]]; then
          echo "Skipping: comment does not mention ${INPUT_REVIEWER} and bot is not in thread"
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [[ "$EVENT_NAME" == "issue_comment" && "$EVENT_IS_PR_COMMENT" != "true" ]]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Atomic claim: add eyes reaction to prevent duplicate processing.
        # GitHub returns 201 for new reactions, 200 if already exists from same user.
        if [[ "$EVENT_NAME" == "issue_comment" ]]; then
          REACTION_URL="repos/${GITHUB_REPOSITORY}/issues/comments/${EFFECTIVE_ID}/reactions"
        else
          REACTION_URL="repos/${GITHUB_REPOSITORY}/pulls/comments/${EFFECTIVE_ID}/reactions"
        fi

        CLAIM_RAW=$(gh api "$REACTION_URL" \
          --method POST \
          --field content=eyes \
          --include 2>/dev/null) || true
        CLAIM_RESPONSE="${CLAIM_RAW%%$'\n'*}"

        if [[ "$CLAIM_RESPONSE" == *"200"* ]]; then
          echo "Skipping: comment already claimed by another workflow run"
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        {
          echo "mode=react"
          echo "skip=false"
          echo "bot_in_thread=${BOT_IN_THREAD}"
        } >> "$GITHUB_OUTPUT"

        if [[ -n "$EVENT_ISSUE_NUMBER" ]]; then
          REACT_PR_NUMBER="$EVENT_ISSUE_NUMBER"
        else
          REACT_PR_NUMBER="$EVENT_PR_NUMBER"
        fi
        echo "pr_number=${REACT_PR_NUMBER}" >> "$GITHUB_OUTPUT"

        # Whether the bot is currently blocking this PR (issue #275): reviewDecision
        # is CHANGES_REQUESTED. The bot is the sole approver and the author cannot
        # self-approve, so reviewDecision is a faithful, pagination-free proxy for the
        # bot's own verdict. classifyReaction uses it to arm a verdict re-evaluation
        # when the author says a blocker is addressed. A failed query degrades to
        # "not blocking" (today's behaviour); only a genuine gh failure warns, so a
        # null decision (no reviews yet) stays quiet.
        if REACT_REVIEW_DECISION=$(gh pr view "$REACT_PR_NUMBER" --json reviewDecision --jq '.reviewDecision // ""' 2>/dev/null); then
          :
        else
          REACT_REVIEW_DECISION=""
          echo "::warning::gh pr view reviewDecision failed for PR #${REACT_PR_NUMBER}; treating bot as not blocking (issue #275 re-verdict will not arm)"
        fi
        BOT_BLOCKING="false"
        if [[ "$REACT_REVIEW_DECISION" == "CHANGES_REQUESTED" ]]; then
          BOT_BLOCKING="true"
        fi
        echo "bot_blocking=${BOT_BLOCKING}" >> "$GITHUB_OUTPUT"

        {
          echo "comment_id=${EFFECTIVE_ID}"
          echo "comment_path=${EVENT_COMMENT_PATH}"
          echo "comment_line=${EVENT_COMMENT_LINE}"
        } >> "$GITHUB_OUTPUT"

        delimiter="$(openssl rand -hex 16)"
        {
          echo "comment_body<<${delimiter}"
          echo "$EFFECTIVE_BODY"
          echo "${delimiter}"
        } >> "$GITHUB_OUTPUT"

    # ── Shared steps ──

    - name: Resolve PR head SHA
      id: resolve-sha
      if: steps.ctx.outputs.skip != 'true' && steps.ctx.outputs.mode == 'react'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.bot_token }}
      run: |
        echo "sha=$(gh pr view ${{ steps.ctx.outputs.pr_number }} --json headRefOid --jq '.headRefOid')" >> "$GITHUB_OUTPUT"

    - name: Checkout repository
      if: steps.ctx.outputs.skip != 'true'
      uses: actions/checkout@v7
      with:
        # Depth 20: lets sub-agent git history walks (HEAD~N) succeed without paying for a full clone.
        fetch-depth: 20
        ref: ${{ steps.ctx.outputs.mode == 'react' && steps.resolve-sha.outputs.sha || steps.ctx.outputs.pr_head_sha }}

    - name: Setup Bun
      if: steps.ctx.outputs.skip != 'true'
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.x

    - name: Write MCP config
      id: mcp
      if: steps.ctx.outputs.skip != 'true' && inputs.mcp_config != ''
      shell: bash
      env:
        MCP_CONFIG: ${{ inputs.mcp_config }}
      run: |
        echo "$MCP_CONFIG" > "$RUNNER_TEMP/mcp-config.json"
        echo "path=$RUNNER_TEMP/mcp-config.json" >> "$GITHUB_OUTPUT"

    # ── Claude Code setup ──

    - name: Install action dependencies
      if: steps.ctx.outputs.skip != 'true'
      shell: bash
      working-directory: ${{ github.action_path }}/../../..
      run: bun install --frozen-lockfile --filter @code-assistants/code-review-action

    - name: Resolve plugin directory
      id: plugin
      if: steps.ctx.outputs.skip != 'true'
      shell: bash
      run: |
        echo "dir=${{ github.action_path }}/../../../claude-plugins/autopilot" >> "$GITHUB_OUTPUT"

    # github `marketplaces`/`plugins` sources clone over HTTPS in CI (no SSH key); the gh credential
    # helper lets that clone authenticate to a private repo with bot_token.
    - name: Authenticate git for private plugin marketplaces
      if: steps.ctx.outputs.skip != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.bot_token }}
      run: gh auth setup-git

    # ── Review mode ──

    - name: Force AI reviewer
      if: steps.ctx.outputs.skip != 'true' && steps.ctx.outputs.mode == 'review'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.bot_token }}
        REVIEWER: ${{ inputs.reviewer }}
        PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
      run: |
        ALREADY_REVIEWER=$(gh pr view "$PR_NUMBER" --json reviewRequests,latestReviews --jq \
          "[(.reviewRequests[]?.login), (.latestReviews[]?.author.login)] | any(. == \"$REVIEWER\")")
        if [[ "$ALREADY_REVIEWER" != "true" ]]; then
          gh pr edit "$PR_NUMBER" --add-reviewer "$REVIEWER" || true
        fi

    - name: Get PR author
      id: pr
      if: steps.ctx.outputs.skip != 'true' && steps.ctx.outputs.mode == 'review'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.bot_token }}
      run: |
        echo "author=$(gh pr view ${{ steps.ctx.outputs.pr_number }} --json author --jq '.author.login')" >> "$GITHUB_OUTPUT"

    - name: Preflight PR checks
      id: preflight
      if: >-
        steps.ctx.outputs.skip != 'true'
        && steps.ctx.outputs.mode == 'review'
        && inputs.preflight_checks == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.bot_token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        REVIEWER: ${{ inputs.reviewer }}
        PR_HEAD_SHA: ${{ steps.ctx.outputs.pr_head_sha }}
        JOB_NAME: ${{ github.job }}
        POLL_INTERVAL: ${{ inputs.poll_interval }}
        CHECKS_TIMEOUT: ${{ inputs.checks_timeout }}
        PR_AUTHOR: ${{ steps.pr.outputs.author }}
      run: bun run "${{ github.action_path }}/src/preflightChecks.ts"

    - name: Explain failed checks
      id: explain
      if: steps.ctx.outputs.skip != 'true' && steps.ctx.outputs.mode == 'review' && steps.preflight.outputs.explain == 'true'
      continue-on-error: true
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        ANTHROPIC_AUTH_TOKEN: ${{ inputs.anthropic_auth_token }}
        ANTHROPIC_BASE_URL: ${{ inputs.anthropic_base_url }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_oauth_token }}
        CLAUDE_MODEL: ${{ inputs.model }}
        CLAUDE_RUN_MODE: preflight
        CLAUDE_JSON_SCHEMA: '{"type":"object","properties":{"reasons":{"type":"array","items":{"type":"object","properties":{"name":{"type":"string"},"reason":{"type":"string"}},"required":["name","reason"]}}},"required":["reasons"]}'
        EXECUTION_OUTPUT_FILE: ${{ runner.temp }}/claude-explain-output.json
        EXPLAIN_PROMPT_FILE: ${{ steps.preflight.outputs.explain_prompt_file }}
        LOG_LEVEL: ${{ inputs.debug_logs == 'true' && 'debug' || 'info' }}
      run: |
        CLAUDE_PROMPT="$(cat "$EXPLAIN_PROMPT_FILE")"
        export CLAUDE_PROMPT
        bun run "${{ github.action_path }}/src/runClaude.ts"

    - name: Post skip comment
      if: always() && steps.ctx.outputs.skip != 'true' && steps.ctx.outputs.mode == 'review' && steps.preflight.outputs.has_failures == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.bot_token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        REVIEWER: ${{ inputs.reviewer }}
        PR_AUTHOR: ${{ steps.pr.outputs.author }}
        FAILED_JSON: ${{ steps.preflight.outputs.failed_json }}
        STRUCTURED_OUTPUT: ${{ steps.explain.outputs.structured_output }}
        RUN_SUMMARY: ${{ steps.explain.outputs.run_summary }}
      run: bun run "${{ github.action_path }}/src/preflightSkipComment.ts"

    - name: Code Review
      id: review
      if: steps.ctx.outputs.skip != 'true' && steps.ctx.outputs.mode == 'review' && steps.preflight.outputs.skip_review != 'true'
      continue-on-error: true
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        ANTHROPIC_AUTH_TOKEN: ${{ inputs.anthropic_auth_token }}
        ANTHROPIC_BASE_URL: ${{ inputs.anthropic_base_url }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_oauth_token }}
        GH_TOKEN: ${{ inputs.bot_token }}
        CLAUDE_PROMPT: |
          ${{ inputs.review_prompt }} REPO: ${{ github.repository }} PR_NUMBER: ${{ steps.ctx.outputs.pr_number }} REVIEWER: ${{ inputs.reviewer }} PR_AUTHOR: ${{ steps.pr.outputs.author }} RULES_DOC_URL: ${{ inputs.rules_doc_url }}
        CLAUDE_RUN_MODE: review
        CLAUDE_MODEL: ${{ inputs.model }}
        CLAUDE_ALLOWED_TOOLS: "Bash(gh:*),mcp__repomix__*,mcp__context7__*,mcp__Ref__*,mcp__exa__*,mcp__perplexity__*,Read,Glob,Grep"
        CLAUDE_DISALLOWED_TOOLS: "Bash(gh pr review:*),Bash(gh pr comment:*),Bash(gh issue comment:*),Bash(gh api * -X *:*),Bash(gh api * --method *:*),Bash(gh api * -f *:*),Bash(gh api * -F *:*),Bash(gh api * --field *:*),Bash(gh api * --raw-field *:*),Bash(gh api * --input *:*),Bash(gh api graphql:*)"
        CLAUDE_JSON_SCHEMA: '{"type":"object","properties":{"verdict":{"type":"string","enum":["approve","requestChanges","comment"]},"reviewComment":{"type":"string"},"inlineComments":{"type":"array","items":{"type":"object","properties":{"path":{"type":"string"},"line":{"type":"integer"},"body":{"type":"string"},"startLine":{"type":"integer"},"suggestion":{"type":"string"}},"required":["path","line","body"]}}},"required":["verdict","reviewComment"]}'
        CLAUDE_PLUGIN_DIR: ${{ steps.plugin.outputs.dir }}
        # Register/install the marketplaces + plugins requested via inputs; the SDK is cache-only without this.
        CLAUDE_CODE_SYNC_PLUGIN_INSTALL: "1"
        CLAUDE_INSTALL_MARKETPLACES: ${{ inputs.marketplaces }}
        CLAUDE_INSTALL_PLUGINS: ${{ inputs.plugins }}
        CLAUDE_MCP_CONFIG: ${{ steps.mcp.outputs.path }}
        CLAUDE_SETTINGS: ${{ inputs.settings }}
        EXECUTION_OUTPUT_FILE: ${{ runner.temp }}/claude-execution-output.json
        LOG_LEVEL: ${{ inputs.debug_logs == 'true' && 'debug' || 'info' }}
      run: bun run "${{ github.action_path }}/src/runClaude.ts"

    - name: Submit Review
      if: steps.ctx.outputs.skip != 'true' && steps.ctx.outputs.mode == 'review' && steps.preflight.outputs.skip_review != 'true' && always() && (steps.review.outcome == 'success' || steps.review.outcome == 'failure')
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.bot_token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        REVIEWER: ${{ inputs.reviewer }}
        STRUCTURED_OUTPUT: ${{ steps.review.outputs.structured_output }}
        EXECUTION_FILE: ${{ steps.review.outputs.execution_file }}
        RUN_SUMMARY: ${{ steps.review.outputs.run_summary }}
        PR_HEAD_SHA: ${{ steps.ctx.outputs.pr_head_sha }}
        RUNNER_TEMP: ${{ runner.temp }}
        CLAUDE_PLUGIN_DIR: ${{ steps.plugin.outputs.dir }}
      run: bun run "${{ github.action_path }}/src/submitReview.ts"

    - name: Upload review execution artifact
      if: >-
        steps.ctx.outputs.skip != 'true'
        && steps.ctx.outputs.mode == 'review'
        && always()
        && (steps.review.outcome == 'failure' || inputs.debug_logs == 'true' || steps.review.outputs.long_run == 'true')
      uses: actions/upload-artifact@v7
      with:
        name: claude-execution-${{ steps.ctx.outputs.pr_number }}-${{ github.run_id }}-${{ github.run_attempt }}
        path: ${{ runner.temp }}/claude-execution-output.json
        retention-days: 14
        if-no-files-found: ignore

    # ── React mode ──

    - name: Classify reaction
      id: classify
      if: steps.ctx.outputs.skip != 'true' && steps.ctx.outputs.mode == 'react'
      shell: bash
      env:
        BOT_IN_THREAD: ${{ steps.ctx.outputs.bot_in_thread }}
        BOT_BLOCKING: ${{ steps.ctx.outputs.bot_blocking }}
        PR_AUTHOR: ${{ github.event.pull_request.user.login || github.event.issue.user.login }}
        COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        COMMENT_BODY: ${{ steps.ctx.outputs.comment_body }}
      run: bun run "${{ github.action_path }}/src/classifyReaction.ts"

    - name: React to Comment
      id: reaction
      if: steps.ctx.outputs.skip != 'true' && steps.ctx.outputs.mode == 'react' && steps.classify.outputs.ack_only != 'true'
      continue-on-error: true
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        ANTHROPIC_AUTH_TOKEN: ${{ inputs.anthropic_auth_token }}
        ANTHROPIC_BASE_URL: ${{ inputs.anthropic_base_url }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_oauth_token }}
        GH_TOKEN: ${{ inputs.bot_token }}
        CLAUDE_PROMPT: |
          ${{ inputs.react_prompt }} REPO: ${{ github.repository }} PR_NUMBER: ${{ steps.ctx.outputs.pr_number }} REVIEWER: ${{ inputs.reviewer }} PR_AUTHOR: ${{ github.event.pull_request.user.login || github.event.issue.user.login }} COMMENT_BODY: ${{ steps.ctx.outputs.comment_body }} COMMENT_PATH: ${{ steps.ctx.outputs.comment_path }} COMMENT_LINE: ${{ steps.ctx.outputs.comment_line }} NEEDS_REVERDICT: ${{ steps.classify.outputs.needs_reverdict }} RULES_DOC_URL: ${{ inputs.rules_doc_url }}
        CLAUDE_RUN_MODE: react
        CLAUDE_MODEL: ${{ inputs.model }}
        CLAUDE_ALLOWED_TOOLS: "Bash(gh:*),mcp__repomix__*,mcp__context7__*,mcp__Ref__*,mcp__exa__*,mcp__perplexity__*,Read,Glob,Grep"
        CLAUDE_DISALLOWED_TOOLS: "Bash(gh pr review:*),Bash(gh pr comment:*),Bash(gh issue comment:*),Bash(gh api * -X *:*),Bash(gh api * --method *:*),Bash(gh api * -f *:*),Bash(gh api * -F *:*),Bash(gh api * --field *:*),Bash(gh api * --raw-field *:*),Bash(gh api * --input *:*),Bash(gh api graphql:*)"
        CLAUDE_JSON_SCHEMA: '{"type":"object","properties":{"reply":{"type":"string"},"resolveComments":{"type":"array","items":{"type":"object","properties":{"path":{"type":"string"},"line":{"type":"integer"}},"required":["path","line"]}},"updatedVerdict":{"type":["string","null"],"enum":["approve","requestChanges","comment",null]},"updatedReviewComment":{"type":["string","null"]}},"required":["reply"]}'
        CLAUDE_PLUGIN_DIR: ${{ steps.plugin.outputs.dir }}
        # Register/install the marketplaces + plugins requested via inputs; the SDK is cache-only without this.
        CLAUDE_CODE_SYNC_PLUGIN_INSTALL: "1"
        CLAUDE_INSTALL_MARKETPLACES: ${{ inputs.marketplaces }}
        CLAUDE_INSTALL_PLUGINS: ${{ inputs.plugins }}
        CLAUDE_MCP_CONFIG: ${{ steps.mcp.outputs.path }}
        CLAUDE_SETTINGS: ${{ inputs.settings }}
        EXECUTION_OUTPUT_FILE: ${{ runner.temp }}/claude-reaction-output.json
        LOG_LEVEL: ${{ inputs.debug_logs == 'true' && 'debug' || 'info' }}
      run: bun run "${{ github.action_path }}/src/runClaude.ts"

    - name: Submit Reaction
      if: steps.ctx.outputs.skip != 'true' && steps.ctx.outputs.mode == 'react' && always() && (steps.reaction.outcome == 'success' || steps.reaction.outcome == 'failure' || steps.classify.outputs.ack_only == 'true')
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.bot_token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        REVIEWER: ${{ inputs.reviewer }}
        COMMENT_ID: ${{ steps.ctx.outputs.comment_id }}
        COMMENT_PATH: ${{ steps.ctx.outputs.comment_path }}
        STRUCTURED_OUTPUT: ${{ steps.reaction.outputs.structured_output }}
        EXECUTION_FILE: ${{ steps.reaction.outputs.execution_file }}
        ACK_ONLY: ${{ steps.classify.outputs.ack_only }}
        RUNNER_TEMP: ${{ runner.temp }}
        CLAUDE_PLUGIN_DIR: ${{ steps.plugin.outputs.dir }}
      run: bun run "${{ github.action_path }}/src/reactToComment.ts"

    - name: Upload reaction execution artifact
      if: >-
        steps.ctx.outputs.skip != 'true'
        && steps.ctx.outputs.mode == 'react'
        && always()
        && (steps.reaction.outcome == 'failure' || inputs.debug_logs == 'true' || steps.reaction.outputs.long_run == 'true')
      uses: actions/upload-artifact@v7
      with:
        name: claude-reaction-${{ steps.ctx.outputs.pr_number }}-${{ github.run_id }}-${{ github.run_attempt }}
        path: ${{ runner.temp }}/claude-reaction-output.json
        retention-days: 14
        if-no-files-found: ignore
