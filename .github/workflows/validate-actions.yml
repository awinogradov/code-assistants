# This file is distributed to downstream repositories by an automated sync.
# Edits made downstream are overwritten on the next run.
# To change it, open a pull request against the source file above.

name: Validate Actions

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"

concurrency:
  group: validate-actions-${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: awinogradov/code-assistants/.github/actions/validate-actions@main
