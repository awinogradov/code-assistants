# Requires repo secret `BOT_TOKEN`: a PAT (classic with `repo`, or fine-grained
# with `contents: write` + `pull-requests: write`) or a GitHub App installation
# token. The default `GITHUB_TOKEN` is not supported — see the action README
# in `.github/actions/upstream-sync` for the rationale.
# Optional repo variable `BOT_USERNAME`: git author login for sync commits.
# Defaults to `github-actions[bot]` when unset.

name: Upstream

on:
  schedule:
    # Every hour at minute 0 (UTC). Picks up upstream changes within ~1h and
    # opens (or updates) one maintenance PR per enabled sync kind.
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: upstream-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync from upstream
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: awinogradov/code-assistants/.github/actions/upstream-sync@main
        with:
          bot_token: ${{ secrets.BOT_TOKEN }}
          bot_username: ${{ vars.BOT_USERNAME }}
          # Every sync kind runs by default. Opt out by setting a kind to false, e.g.:
          # release: false
