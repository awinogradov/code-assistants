# Dogfood workflow: labels this repo's own PRs using the LOCAL auto-label action,
# so it works on the same PR that introduces the action (before it exists at @main).
# Downstream consumers receive the @main-referencing template at
# .github/actions/auto-label/consumer-workflow.yml via contributing-sync.

name: Auto label

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

# Shared group across both events so a push-triggered prune never runs concurrently
# with a pull_request-triggered label sync (which would race on the same labels).
concurrency:
  group: auto-label-${{ github.repository }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  auto-label:
    name: Auto label
    # Fork PRs run with a read-only token and cannot write labels; skip them.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Required so the local `./.github/actions/auto-label` reference resolves.
      - uses: actions/checkout@v4
      - uses: ./.github/actions/auto-label
        with:
          token: ${{ github.token }}
