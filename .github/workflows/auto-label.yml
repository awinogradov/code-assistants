# Source: https://github.com/awinogradov/code-assistants/blob/main/.github/workflows/auto-label.yml
# This file is distributed to downstream repositories by an automated sync.
# Edits made downstream are overwritten on the next run.
# To change it, open a pull request against the source file above.

name: Auto label

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

# Per-PR concurrency: concurrent PRs never cancel each other's label sync, and a
# newer sync for the same PR supersedes the older run. The push-prune runs in its
# own (github.ref) group so PR activity never cancels it. A prune may briefly
# overlap a PR sync, but that is self-healing — the next push re-prunes and each
# PR's labels reflect its own diff.
concurrency:
  group: auto-label-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  auto-label:
    name: Auto label
    # Fork PRs run with a read-only token and cannot write labels; skip them.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: awinogradov/code-assistants/.github/actions/auto-label@main
        with:
          token: ${{ github.token }}
